<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Shoot</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#0d0d0d;
    color:#fff;
    padding:30px 20px 50px;
}

.container{
    max-width:1200px;
    margin:0 auto;
}

.back{
    display:inline-block;
    margin-bottom:24px;
    padding:10px 18px;
    border-radius:999px;
    background:gold;
    color:#000;
    text-decoration:none;
    font-weight:600;
}

h1{
    font-family:'Playfair Display', serif;
    font-size:42px;
    margin-bottom:10px;
    color:gold;
    text-align:center;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:18px;
    margin-top:24px;
}

.gallery img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:14px;
    display:block;
    background:#1a1a1a;
}

@media (max-width: 768px){
    h1{
        font-size:32px;
    }

    .gallery img{
        height:240px;
    }
}
</style>
</head>
<body>
<div class="container">
    <a href="webpage.html" class="back">Back</a>
    <h1>Ad Shoot</h1>

    <div class="gallery">
        <img src="" alt="Ad shoot 1">
        <img src="" alt="Ad shoot 2">
        <img src="" alt="Ad shoot 3">
        <img src="" alt="Ad shoot 4">
        <img src="" alt="Ad shoot 5">
        <img src="" alt="Ad shoot 6">
        <img src="" alt="Ad shoot 7">
        <img src="" alt="Ad shoot 8">
        <img src="" alt="Ad shoot 9">
        <img src="" alt="Ad shoot 10">
        <img src="" alt="Ad shoot 11">
        <img src="" alt="Ad shoot 12">
    </div>
</div>
</body>
</html>
